<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shifting Source — Keto & Fasting Lifestyle. Videnskabsbaserede keto-opskrifter, fasteprotokoller og guides til et sundere liv." />

    <!-- Security headers via meta tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Open Graph defaults (overridden per page by seo.ts) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Shifting Source" />
    <meta property="og:locale" content="da_DK" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Google Fonts: DM Serif Display, Nunito Sans, Dancing Script -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Dancing+Script:wght@400;500&family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet" />

    <!-- Preconnect to Supabase for faster API calls -->
    <link rel="preconnect" href="https://hllprmlkuchhfmexzpad.supabase.co" />

    <title>Shifting Source — Keto & Fasting Lifestyle</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Global: add loading="lazy" to all images outside viewport -->
    <script>
      new MutationObserver(function(mutations) {
        mutations.forEach(function(m) {
          m.addedNodes.forEach(function(node) {
            if (node.nodeType === 1) {
              var imgs = node.tagName === 'IMG' ? [node] : node.querySelectorAll ? node.querySelectorAll('img:not([loading])') : [];
              imgs.forEach(function(img) { if (!img.hasAttribute('loading')) img.loading = 'lazy'; });
            }
          });
        });
      }).observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
  </body>
</html>
