# GitHub Actions: Build & Deploy Shifting Source Website
# Triggers on push to main branch (website-react directory)
# Builds the React app and deploys via SFTP to one.com

name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website-react/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch: # Allow manual trigge

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website-react

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true
        # Fejler ikke build, men logger sårbarheder

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Explore SFTP directory structure
        working-directory: .
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -p "${{ secrets.SFTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }} "pwd && echo '--- HOME ---' && ls -la && echo '--- HTTPD ---' && ls -la httpd.www 2>/dev/null || echo 'no httpd.www' && echo '--- WEBROOTS ---' && ls -la webroots 2>/dev/null || echo 'no webroots' && echo '--- FIND DOMAIN ---' && find / -name 'shiftingsource*' -maxdepth 5 2>/dev/null | head -20 && echo '--- FIND INDEX ---' && find / -name 'index.html' -maxdepth 5 2>/dev/null | head -20"

      - name: Deploy to SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          local_path: ./website-react/dist/
          remote_path: ./
          sftp_only: true
