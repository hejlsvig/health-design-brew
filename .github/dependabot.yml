# Dependabot — automatisk sårbarhedsscanning og opdatering
version: 2
updates:
  # Frontend (React app)
  - package-ecosystem: "npm"
    directory: "/website-react"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "hejlsvig"
    labels:
      - "dependencies"
      - "security"

  # Backend (Node.js/Express)
  - package-ecosystem: "npm"
    directory: "/Keto_Calculator_Project/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "hejlsvig"
    labels:
      - "dependencies"
      - "security"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
