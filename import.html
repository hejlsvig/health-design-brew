n servering. Du kan overveje at skære dem i skiver og servere dem på fad."}, {"step_number": 14, "step_text": "Server hele herligheden sammen. Du vil formentlig have mere bearnaise end du skal bruge. Gem resten i køleskab og spis som bearnaisesmør de kommende dage."}], "en": [{"step_number": 1, "step_text": "Take the steaks out of the fridge and let them come to room temperature."}, {"step_number": 2, "step_text": "Clean the mushrooms, cut off the stems and chop them."}, {"step_number": 3, "step_text": "Chop the red onion, garlic and chili (without seeds) finely. Chop the parsley too."}, {"step_number": 4, "step_text": "Warm butter in a pan and fry the whole mixture (except the parsley) in it. Stir in the parsley last."}, {"step_number": 5, "step_text": "Preheat the oven to 180°C. Place the mushrooms in a buttered oven-safe dish and distribute the filling in them. Crumble the feta over them."}, {"step_number": 6, "step_text": "Bake them in the oven for about 10 minutes."}, {"step_number": 7, "step_text": "Cut the zucchini into long slices and toss them in olive oil, salt and pepper. Fry them on the pan/grill pan over high heat so they get color."}, {"step_number": 8, "step_text": "Melt butter in a saucepan."}, {"step_number": 9, "step_text": "Whisk/blend the egg yolks with an immersion blender and pour in the melted butter little by little so the sauce thickens as you go. Continue until you've used all the butter (discard any that's left on the bottom)"}, {"step_number": 10, "step_text": "Add béarnaise essence and taste it. Stir in the chopped tarragon last."}, {"step_number": 11, "step_text": "Warm butter in the pan (optionally with a little olive oil). Let it get really hot."}, {"step_number": 12, "step_text": "Fry the steaks in it for about 2-4 minutes per side – depending on thickness and how you like them. Turn them as little as possible so you get a nice crust."}, {"step_number": 13, "step_text": "Take the steaks off the pan and let them rest for five minutes without bone)", "amount": 1.5, "name": "-2 kg pork roast (without bone)"}, {"full_text": "1 tbsp salt", "amount": 1.0, "unit": "tbsp", "name": "salt"}], "se": [{"full_text": "1,5-2 kg flaskstekt (utan ben)", "amount": 1.5, "name": "-2 kg flaskstekt (utan ben)"}, {"full_text": "1 msk salt", "amount": 1.0, "unit": "msk", "name": "salt"}]}, "instructions": {"da": [{"step_number": 1, "step_text": "Opvarm ovnen til 160 grader."}, {"step_number": 2, "step_text": "Gnid stegen godt og grundigt med salt. Rids evt. de svær som ikke er ridset helt dybt nok, undgå dog at skære ned i kødet."}, {"step_number": 3, "step_text": "Sæt den ind ind i den forvarmede ovn på en rist med en bradepande under, hvori du har hældt ½ liter vand."}, {"step_number": 4, "step_text": "Lad stegen passe sig selv i 2 timer. Hold dog øje med, om der er vand nok i bradepanden og spæd op, hvis den løber tør."}, {"step_number": 5, "step_text": "Når de to timer er gået, tager du bradepanden ud, og skruer ovnen op på 250 grader."}, {"step_number": 6, "step_text": "Stegen skal nu stege uden væske i 20-30 min. Læg lidt sølvpapir eller en tør bradepande i bunden af ovnen af hensyn til det dryppende fedt."}, {"step_number": 7, "step_text": "Tjek sværene efter 20 min. og giv dem evt. 2-3 min. på grill, hvis det er nødvendigt."}], "en": [{"step_number": 1, "step_text": "Preheat the oven to 160°C."}, {"step_number": 2, "step_text": "Rub the roast thoroughly with salt. Score the rind if it's not scored deep enough, but avoid cutting into the meat."}, {"step_number": 3, "step_text": "Place it in the preheated oven on a rack with a roasting pan underneath filled with ½ liter of water."}, {"step_number": 4, "step_text": "Let the roast cook on its own for 2 hours. Keep an eye on whether there's enough water in the roasting pan and top up if it runs dry."}, {"step_number": 5, "step_text": "When two hours are up, take out the roasting pan and turn the oven up to 250°C."}, {"step_number": 6, "step_text": "The roast should now cook without any liquid for 20-30 minutes. Place some aluminum foil or an empty roasting pan in the bottom of the oven to catch the dripping fat."}, {"step_number": 7, "step_text": "Check the rind after 20 minutes and give it another 2-3 minutes under the broiler if necessary."}], "se": [{"step_number": 1, "step_text": "Värm ugnen till 160 grader."}, {"step_number": 2, "step_text": "Gnid stechen noggrant med salt. Ridsa gärna in svåren som inte är inridsat tillräckligt djupt, men undvik att skära ner i köttet."}, {"step_number": 3, "step_text": "Sätt in den i den förvarmade ugnen på en galler med en stekpanna under, där du har hällt ½ liter vatten."}, {"step_number": 4, "step_text": "Låt stechen vila för sig själv i 2 timmar. Håll dock ett öga på om det finns tillräckligt med vatten i stekpannan och fylla på om den blir tom."}, {"step_number": 5, "step_text": "När två timmar har gått tar du ut stekpannan och skruvar upp ugnen till 250 grader."}, {"step_number": 6, "step_text": "Stechen ska nu steka utan väska i 20-30 min. Lägg lite aluminiumfolie eller en tom stekpanna i botten av ugnen för att skydda mot det drypande fettet."}, {"step_number": 7, "step_text": "Kontrollera svåren efter 20 min. och ge dem eventuellt 2-3 min. under grillen om det är nödvändigt."}]}, "tips": {"da": "Kernetemperaturen på flæskesteg skal være over 62 grader men helst under 68 grader. Udover de sprøde svær, er det nemlig vigtigt at stegen ikke er for tør. Stegetiden kan derfor afhænge af hvor stor en flæskesteg du har med at gøre. Tjek evt. løbende med et stegetermometer. Stegen må gerne være rosa, kernetemperaturen skal bare være over 62 grader for at alle bakterier er slået ihjel. Bliver kernetemperaturen højere end 65-68 grader, kan du godt ende med en tør steg. Derfor kan den sidste tur ved de 250 grader evt. forkortes hvis stegen allerede har nået en god kernetemperatur. Så giver du den bare en gang på grillen, så sværene lige popper. Men hold øje, svedne svær smager altså heller ikke godt! Formentlig skal der andet på bordet end flæskesteg. Udover det klassiske juletilbehør såsomlun rødkålogbrun sovskan du også vælge at lave enflæskestegssandwich. Vi plejer som regel også at have en frisk rødkålssalat på bordet fxkålsalat til julebordet. Flæskestegssandwichen kan naturligvis også godt indeholde en frisk rødkålssalat eller både lun rødkålssalat og brun sovs, det vil jo nærmest blive en slags bøfsandwich med flæskesteg? Uhm! Ofte er der jo også de gode rester dagen efter. Herhjemme bliver de naturligvis brugt i fx flæskestegssandwich eller som tilbehør til en god salat. Men det er dog svært at få sværrene til at forblive sprøde – også dagen efter. Hvis du har et godt fif til sprøde svær dagen efter, skal du ikke holde dig tilbage. Måske en tur under grillen vil gøre underværker? Hvis jeg skal være helt ærlig, så er Søren en noget mere habil flæskestegssteger end mig. Så jeg er helt tryg når han står for det. Ud af ovnen kommer altid flæskesteg ud med de sprødeste svær ever! Jeg er altid dybt, dybt imponeret! Og jeg er faktisk ikke så vild med flæskesteg, ikke engang til jul, men jeg må erkende, at denne smager godt. Rigtig godt, faktisk. Den var saftig og smagfuld og langt fra de tørre flæskestege, jeg ofte har siddet og hostet lidt i. Men nu hvor jeg har givet noget, der ligner stående applaus til flæskestegen, er jeg selvfølgelig også nødt til dele svigermors hellige opskrift med jer :)"}, "calories": 698, "protein": 56.0, "fat": 53.0, "carbs": null, "fiber": null, "prep_time": null, "cook_time": 30, "servings": 6, "difficulty": "easy", "categories": ["Aftensmad", "Danske klassikere", "Gris"], "tags": ["Keto", "LCHF", "Low Carb", "Sukkerfri", "Dansk"], "published_countries": ["da", "se", "en"], "status": "draft", "featured": false, "seo_title": {"da": "Flæskesteg med sprøde svær", "en": "Roast Pork with Crispy Rind", "se": "Fläskstek med frasiga svär"}, "seo_description": {"da": "Flæskesteg stegt ved lav temperatur bliver mild og mørt med const log = document.getElementById("log");
function addLog(msg) { log.textContent += msg + "\n"; }

async function importRecipe(recipe) {
  const url = SUPA_URL + "/rest/v1/recipes";
  const headers = {
    "apikey": SUPA_KEY,
    "Authorization": "Bearer " + SUPA_KEY,
    "Content-Type": "application/json",
    "Prefer": "return=representation"
  };
  const checkResp = await fetch(url + "?slug=eq." + recipe.slug + "&select=id", { headers });
  const existing = await checkResp.json();
  if (existing.length > 0) {
    const resp = await fetch(url + "?slug=eq." + recipe.slug, { method: "PATCH", headers, body: JSON.stringify(recipe) });
    const data = await resp.json();
    return { op: "UPDATE", status: resp.status, slug: recipe.slug, id: data[0]?.id };
  } else {
    const resp = await fetch(url, { method: "POST", headers, body: JSON.stringify(recipe) });
    const data = await resp.json();
    return { op: "INSERT", status: resp.status, slug: recipe.slug, id: data[0]?.id };
  }
}

(async () => {
  addLog("Starting import of " + recipes.length + " recipes...");
  let ok = 0, err = 0;
  for (let i = 0; i < recipes.length; i++) {
    try {
      const result = await importRecipe(recipes[i]);
      addLog("[" + (i+1) + "/" + recipes.length + "] " + result.op + " " + result.slug + " (status: " + result.status + ", id: " + result.id + ")");
      if (result.status >= 200 && result.status < 300) ok++;
      else err++;
    } catch(e) {
      addLog("[" + (i+1) + "] ERROR: " + e.message);
      err++;
    }
  }
  addLog("\nDone! " + ok + " success, " + err + " errors");
})();
